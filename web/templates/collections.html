<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合集管理 - BlackHoleBot</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h1>BlackHoleBot</h1>
                <p>Jokers, God 🎭 制造者联盟</p>
            </div>
            <nav class="nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span> 仪表盘
                </a>
                <a href="/collections" class="nav-item active">
                    <span class="icon">📁</span> 合集管理
                </a>
                <a href="/tasks" class="nav-item">
                    <span class="icon">🔄</span> 搬运任务
                </a>
                <a href="/sessions" class="nav-item">
                    <span class="icon">🔑</span> Session 管理
                </a>
                <a href="/users" class="nav-item">
                    <span class="icon">👥</span> 用户管理
                </a>
                <a href="/settings" class="nav-item">
                    <span class="icon">⚙️</span> 系统设置
                </a>
            </nav>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2>📁 合集管理</h2>
                <div class="header-actions">
                    <input type="text" id="searchInput" placeholder="搜索合集..." class="search-input">
                    <select id="accessFilter" class="filter-select">
                        <option value="">全部权限</option>
                        <option value="public">公开</option>
                        <option value="vip">VIP</option>
                    </select>
                    <button id="batchDeleteBtn" class="btn btn-danger" style="display: none;">批量删除</button>
                </div>
            </div>

            <div class="collections-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th width="50">
                                <input type="checkbox" id="selectAll">
                            </th>
                            <th>名称</th>
                            <th>描述</th>
                            <th>媒体数</th>
                            <th>访问权限</th>
                            <th>创建时间</th>
                            <th width="200">操作</th>
                        </tr>
                    </thead>
                    <tbody id="collectionsTable">
                        <tr>
                            <td colspan="7" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- 编辑合集模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑合集</h3>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="editCollectionId">
                    <div class="form-group">
                        <label>合集名称</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签（用逗号分隔）</label>
                        <input type="text" id="editTags">
                    </div>
                    <div class="form-group">
                        <label>访问权限</label>
                        <select id="editAccessLevel">
                            <option value="public">公开</option>
                            <option value="vip">VIP</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/collections.js"></script>
</body>
</html>
